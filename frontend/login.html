<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NovaChat — Вход</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        .auth-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 28px;
            background: var(--bg-secondary);
            min-height: 100vh;
        }

        .auth-logo {
            font-size: 48px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .auth-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .auth-subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            text-align: center;
            max-width: 320px;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .auth-form {
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .auth-form .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .auth-form .field label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .auth-form .field input {
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: all var(--duration) var(--ease);
            width: 100%;
        }

        .auth-form .field input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-light);
        }

        .auth-form .field .error {
            font-size: 12px;
            color: var(--busy);
            margin-top: 2px;
        }

        .btn-primary {
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--duration) var(--ease);
            margin-top: 4px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--accent-glow);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 8px 0;
            color: var(--text-tertiary);
            font-size: 13px;
            max-width: 360px;
            width: 100%;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .social-buttons {
            display: flex;
            gap: 12px;
            max-width: 360px;
            width: 100%;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--bg-primary);
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--duration) var(--ease);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .social-btn:hover {
            border-color: var(--accent);
            background: var(--bg-hover);
        }

        .auth-footer {
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .auth-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        /* Переключение между входом и регистрацией */
        .auth-toggle {
            display: flex;
            gap: 0;
            margin-bottom: 24px;
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1.5px solid var(--border);
            max-width: 360px;
            width: 100%;
        }

        .auth-toggle button {
            flex: 1;
            padding: 10px;
            border: none;
            background: var(--bg-primary);
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--duration) var(--ease);
        }

        .auth-toggle button.active {
            background: var(--accent);
            color: white;
        }

        .auth-toggle button:not(.active):hover {
            background: var(--bg-hover);
        }

        .hidden {
            display: none !important;
        }

        .toast-container {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            pointer-events: none;
        }

        .toast {
            background: var(--bg-elevated);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 12px 20px;
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 13px;
            font-weight: 500;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            transform: translateY(16px) scale(0.96);
            transition: all 0.3s var(--ease-spring);
            pointer-events: auto;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .toast.success { border-left: 3px solid var(--online); }
        .toast.error { border-left: 3px solid var(--busy); }
        .toast.info { border-left: 3px solid var(--accent); }

        .app-container {
            max-width: 480px;
            width: 100%;
            min-height: 100vh;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            margin: 0 auto;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
        }

        body {
            padding: 0;
            background: var(--bg);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        @media (max-width: 640px) {
            .app-container {
                border: none;
                box-shadow: none;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="auth-container" id="authContainer">
        <div class="auth-logo">✦</div>
        <div class="auth-title">NovaChat</div>
        <div class="auth-subtitle">Безопасный мессенджер будущего</div>

        <!-- Toggle: Вход / Регистрация -->
        <div class="auth-toggle" id="authToggle">
            <button class="active" data-mode="login">Вход</button>
            <button data-mode="register">Регистрация</button>
        </div>

        <!-- Форма входа -->
        <form class="auth-form" id="loginForm">
            <div class="field">
                <label>Email или username</label>
                <input type="text" id="loginEmail" placeholder="example@mail.com" required>
            </div>
            <div class="field">
                <label>Пароль</label>
                <input type="password" id="loginPassword" placeholder="••••••••" required>
            </div>
            <button class="btn-primary" type="submit">Войти</button>
        </form>

        <!-- Форма регистрации -->
        <form class="auth-form hidden" id="registerForm">
            <div class="field">
                <label>Имя пользователя</label>
                <input type="text" id="regUsername" placeholder="username" required minlength="3" maxlength="30">
            </div>
            <div class="field">
                <label>Email</label>
                <input type="email" id="regEmail" placeholder="example@mail.com" required>
            </div>
            <div class="field">
                <label>Пароль</label>
                <input type="password" id="regPassword" placeholder="••••••••" required minlength="6">
                <div class="error" id="regError"></div>
            </div>
            <button class="btn-primary" type="submit">Создать аккаунт</button>
        </form>

        <!-- Разделитель -->
        <div class="auth-divider">или</div>

        <!-- Социальные кнопки -->
        <div class="social-buttons">
            <button class="social-btn" id="googleBtn">
                <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Google
            </button>
            <button class="social-btn" id="facebookBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                Facebook
            </button>
        </div>

        <div class="auth-footer" id="authFooter">
            Нет аккаунта? <a id="switchToRegister">Зарегистрироваться</a>
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer">
    <div class="toast" id="toast"><span id="toastMessage">Готово</span></div>
</div>

<script>
(function() {
    'use strict';

    const API_BASE = window.location.protocol === 'file:' ? 'http://localhost:8000' : window.location.origin;

    // ===== DOM =====
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const loginEmail = document.getElementById('loginEmail');
    const loginPassword = document.getElementById('loginPassword');
    const regUsername = document.getElementById('regUsername');
    const regEmail = document.getElementById('regEmail');
    const regPassword = document.getElementById('regPassword');
    const regError = document.getElementById('regError');
    const toast = document.getElementById('toast');
    const toastMessage = document.getElementById('toastMessage');
    const authToggle = document.getElementById('authToggle');
    const switchToRegister = document.getElementById('switchToRegister');
    const authFooter = document.getElementById('authFooter');

    let currentMode = 'login';

    function showToast(msg, type = 'info', duration = 3000) {
        toast.className = 'toast ' + type;
        toastMessage.textContent = msg;
        clearTimeout(toast._timer);
        void toast.offsetWidth;
        toast.classList.add('show');
        toast._timer = setTimeout(() => toast.classList.remove('show'), duration);
    }

    function setMode(mode) {
        currentMode = mode;
        const buttons = authToggle.querySelectorAll('button');
        buttons.forEach(btn => {
            btn.classList.toggle('active', btn.dataset.mode === mode);
        });
        loginForm.classList.toggle('hidden', mode === 'register');
        registerForm.classList.toggle('hidden', mode === 'login');
        authFooter.innerHTML = mode === 'login'
            ? 'Нет аккаунта? <a id="switchToRegister">Зарегистрироваться</a>'
            : 'Уже есть аккаунт? <a id="switchToLogin">Войти</a>';
        
        const switchReg = document.getElementById('switchToRegister');
        const switchLogin = document.getElementById('switchToLogin');
        if (switchReg) switchReg.addEventListener('click', (e) => { e.preventDefault(); setMode('register'); });
        if (switchLogin) switchLogin.addEventListener('click', (e) => { e.preventDefault(); setMode('login'); });
    }

    authToggle.addEventListener('click', (e) => {
        const btn = e.target.closest('button');
        if (btn && btn.dataset.mode) setMode(btn.dataset.mode);
    });

    setMode('login');

    // ===== API =====
    async function apiFetch(endpoint, options = {}) {
        const url = `${API_BASE}/api${endpoint}`;
        const res = await fetch(url, {
            ...options,
            headers: { 'Content-Type': 'application/json', ...(options.headers || {}) }
        });
        if (!res.ok) {
            let msg = `Ошибка ${res.status}`;
            try { const err = await res.json(); msg = err.detail || msg; } catch {}
            throw new Error(msg);
        }
        return res.json();
    }

    // ===== LOGIN =====
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = loginEmail.value.trim();
        const password = loginPassword.value.trim();
        if (!email || !password) {
            showToast('Заполните все поля', 'error');
            return;
        }
        try {
            const result = await apiFetch('/auth/login', {
                method: 'POST',
                body: JSON.stringify({ username: email, password })
            });
            localStorage.setItem('nova-user-id', result.user_id);
            localStorage.setItem('nova-token', result.token);
            showToast('✅ Успешный вход!', 'success', 2000);
            setTimeout(() => {
                window.location.href = '/chat';
            }, 1500);
        } catch (err) {
            showToast('❌ ' + err.message, 'error');
        }
    });

    // ===== REGISTER =====
    registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = regUsername.value.trim();
        const email = regEmail.value.trim();
        const password = regPassword.value.trim();

        if (!username || !email || !password) {
            regError.textContent = 'Заполните все поля';
            return;
        }
        if (username.length < 3) {
            regError.textContent = 'Username минимум 3 символа';
            return;
        }
        if (password.length < 6) {
            regError.textContent = 'Пароль минимум 6 символов';
            return;
        }

        regError.textContent = '';
        const btn = registerForm.querySelector('.btn-primary');
        btn.disabled = true;
        btn.textContent = '⏳ Создание...';

        try {
            const result = await apiFetch('/auth/register', {
                method: 'POST',
                body: JSON.stringify({ username, email, password, full_name: username })
            });
            showToast('✅ Аккаунт создан! Войдите', 'success', 3000);
            setMode('login');
            loginEmail.value = email;
            loginPassword.value = password;
            // Автоматический вход после регистрации
            try {
                const loginResult = await apiFetch('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ username: email, password })
                });
                localStorage.setItem('nova-user-id', loginResult.user_id);
                localStorage.setItem('nova-token', loginResult.token);
                showToast('✅ Вход выполнен!', 'success', 1500);
                setTimeout(() => {
                    window.location.href = '/chat';
                }, 1000);
            } catch (loginErr) {
                showToast('✅ Аккаунт создан! Войдите вручную', 'success', 3000);
            }
        } catch (err) {
            regError.textContent = err.message;
            showToast('❌ ' + err.message, 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Создать аккаунт';
        }
    });

    // ===== SOCIAL (заглушки) =====
    document.getElementById('googleBtn').addEventListener('click', () => {
        showToast('🔜 Вход через Google будет доступен позже', 'info', 3000);
    });

    document.getElementById('facebookBtn').addEventListener('click', () => {
        showToast('🔜 Вход через Facebook будет доступен позже', 'info', 3000);
    });

    // Проверяем, есть ли уже сессия
    const userId = localStorage.getItem('nova-user-id');
    if (userId) {
        fetch(`${API_BASE}/api/profile/${userId}`)
            .then(res => {
                if (res.ok) window.location.href = '/chat';
            })
            .catch(() => {});
    }

})();
</script>
</body>
</html>
