<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#007aff">
    <title>NovaChat</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>

<div class="app-container" id="app">
    <!-- HEADER -->
    <header class="header">
        <div class="header-left">
            <button class="icon-btn" id="settingsToggle" aria-label="Настройки">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v4m0 14v4M1 12h4m14 0h4M4.22 4.22l2.83 2.83m9.9 9.9l2.83 2.83M4.22 19.78l2.83-2.83m9.9-9.9l2.83-2.83"/></svg>
            </button>
        </div>

        <div class="header-center">
            <span class="logo">✦ NovaChat</span>
            <span class="version">BETA_TEST</span>
        </div>

        <div class="header-right">
            <button class="icon-btn" id="changelogToggle" aria-label="Changelog">
                <svg viewBox="0 0 24 24"><path d="M12 8v4l3 3M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z"/></svg>
            </button>
            <button class="icon-btn theme-toggle" id="themeToggle" aria-label="Тема">
                <svg viewBox="0 0 24 24" id="themeIcon"><path d="M12 3a6 6 0 0 0 9 9 6 6 0 1 1-9-9"/></svg>
            </button>
            <a href="profile.html" class="icon-btn" style="text-decoration:none;" aria-label="Профиль">
                <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </a>
            <button class="icon-btn" id="logoutBtn" aria-label="Выйти" style="color:var(--busy);">
                <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </button>
        </div>
    </header>

    <!-- ПОИСК -->
    <div class="search-bar">
        <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" stroke="var(--text-tertiary)" fill="none" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Поиск чатов и сообщений...">
    </div>

    <!-- MAIN -->
    <div class="main-area">
        <!-- Chat List -->
        <div class="chat-list" id="chatList">
            <div class="chat-list-header">
                <span>Чаты</span>
                <span class="count">4</span>
            </div>

            <div class="chat-item active" data-chat="1">
                <div class="avatar" style="background:#007aff;">
                    А
                    <span class="status-dot online"></span>
                </div>
                <div class="info">
                    <div class="name">Алексей</div>
                    <div class="last-msg">Привет! Как дела?</div>
                </div>
                <div class="meta">
                    <span class="time">14:32</span>
                    <span class="unread">2</span>
                </div>
            </div>

            <div class="chat-item" data-chat="2">
                <div class="avatar" style="background:#ff9500;">
                    М
                    <span class="status-dot away"></span>
                </div>
                <div class="info">
                    <div class="name">Марина</div>
                    <div class="last-msg">Скинь фото, пожалуйста</div>
                </div>
                <div class="meta">
                    <span class="time">12:10</span>
                    <span class="unread">5</span>
                </div>
            </div>

            <div class="chat-item" data-chat="3">
                <div class="avatar" style="background:#34c759;">
                    К
                    <span class="status-dot online"></span>
                </div>
                <div class="info">
                    <div class="name">Команда проекта</div>
                    <div class="last-msg">Вы: ок, завтра обсудим</div>
                </div>
                <div class="meta">
                    <span class="time">вчера</span>
                </div>
            </div>

            <div class="chat-item" data-chat="4">
                <div class="avatar" style="background:#ff3b30;">
                    Д
                    <span class="status-dot busy"></span>
                </div>
                <div class="info">
                    <div class="name">Дмитрий</div>
                    <div class="last-msg">Где встречаемся?</div>
                </div>
                <div class="meta">
                    <span class="time">вчера</span>
                </div>
            </div>
        </div>

        <!-- Dialog -->
        <div class="dialog" id="dialog">
            <div class="dialog-header">
                <button class="back-btn icon-btn" id="backBtn">
                    <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                </button>
                <div class="dialog-user-info" id="dialogUserInfo">
                    <div class="dialog-avatar" style="background:#007aff;">А</div>
                    <div>
                        <div class="dialog-name" id="chatName">Алексей</div>
                        <div class="dialog-status online" id="chatStatus">В сети</div>
                    </div>
                </div>
                <div class="dialog-actions">
                    <button class="icon-btn">
                        <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                    </button>
                    <button class="icon-btn">
                        <svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
                    </button>
                    <button class="icon-btn">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
                    </button>
                </div>
            </div>

            <div class="messages" id="messages">
                <div class="date-divider">Сегодня</div>
            </div>

            <div class="input-area">
                <button class="icon-btn">
                    <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                </button>
                <div class="input-wrapper">
                    <button class="icon-btn">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
                    </button>
                    <input type="text" id="msgInput" placeholder="Сообщение..." autofocus>
                </div>
                <button class="send-btn" id="sendBtn">
                    <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast-container" id="toastContainer">
    <div class="toast" id="toast">
        <span id="toastMessage">Готово</span>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
